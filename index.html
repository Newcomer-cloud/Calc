<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор консолидированной ставки</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #2B2B2B; /* Ваш цвет фона */
            color: #E0E0E0; /* Светло-серый текст для комфортного чтения */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #3C3F41; /* Чуть более светлый оттенок для формы */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #4E5254; /* Тонкая рамка контейнера */
        }
        h2 {
            text-align: center;
            color: #FFFFFF;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .loan-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .loan-item span {
            font-weight: bold;
            color: #A9B7C6; /* Цвет цифр (как в среде разработки) */
            width: 20px;
        }
        .loan-item input {
            flex: 1;
            padding: 12px;
            background-color: #2B2B2B; /* Поля ввода в тон общего фона */
            border: 1px solid #555555; /* Неброская рамка */
            border-radius: 6px;
            font-size: 14px;
            color: #FFFFFF;
            outline: none;
            transition: border-color 0.2s;
        }
        .loan-item input:focus {
            border-color: #3498db; /* Синий акцент при нажатии */
        }
        /* Убираем стрелочки у input number для красоты */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-add {
            background-color: #2D5A88;
            color: #FFFFFF;
        }
        .btn-remove {
            background-color: #8E3535;
            color: #FFFFFF;
        }
        button:disabled {
            background-color: #4B4D4D;
            color: #777777;
            cursor: not-allowed;
        }
        .btn-calc {
            background-color: #437D52; /* Приглушенный зеленый */
            color: white;
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #313335;
            border: 1px dashed #555555;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            display: none;
        }
        .result strong {
            color: #A5C261; /* Салатовый цвет для результата */
            font-size: 22px;
        }
        .error {
            color: #BC3F3C;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Калькулятор средневзвешенной ставки</h2>
        
        <div id="loans-container"></div>

        <div class="controls">
            <button class="btn-remove" id="btn-remove" onclick="removeLoan()" disabled>− Убрать</button>
            <button class="btn-add" id="btn-add" onclick="addLoan()">+ Добавить</button>
        </div>

        <button class="btn-calc" onclick="calculate()">Рассчитать ставку</button>

        <div class="error" id="error-msg">Введите корректные данные (долг > 0).</div>
        <div class="result" id="result"></div>
    </div>

    <script>
        let currentLoans = 2;
        const maxLoans = 7;
        const minLoans = 2;

        window.onload = function() {
            const container = document.getElementById('loans-container');
            let htmlContent = '';
            for (let i = 1; i <= maxLoans; i++) {
                let displayStyle = i <= currentLoans ? 'flex' : 'none';
                htmlContent += `
                    <div id="loan-${i}" class="loan-item" style="display: ${displayStyle};">
                        <span>${i}.</span>
                        <input type="number" id="principal-${i}" placeholder="Долг (₽)" min="0" step="0.01">
                        <input type="number" id="rate-${i}" placeholder="Ставка (%)" min="0" step="0.01">
                    </div>
                `;
            }
            container.innerHTML = htmlContent;
        };

        function updateVisibility() {
            for (let i = 1; i <= maxLoans; i++) {
                const row = document.getElementById('loan-' + i);
                if (row) {
                    row.style.display = (i <= currentLoans) ? 'flex' : 'none';
                    if (i > currentLoans) {
                        document.getElementById('principal-' + i).value = '';
                        document.getElementById('rate-' + i).value = '';
                    }
                }
            }
            document.getElementById('btn-add').disabled = (currentLoans >= maxLoans);
            document.getElementById('btn-remove').disabled = (currentLoans <= minLoans);
        }

        function addLoan() {
            if (currentLoans < maxLoans) {
                currentLoans++;
                updateVisibility();
            }
        }

        function removeLoan() {
            if (currentLoans > minLoans) {
                currentLoans--;
                updateVisibility();
            }
        }

        function calculate() {
            let totalPrincipal = 0;
            let weightedSum = 0;

            for (let i = 1; i <= currentLoans; i++) {
                const p = parseFloat(document.getElementById('principal-' + i).value);
                const r = parseFloat(document.getElementById('rate-' + i).value);

                if (!isNaN(p) && p > 0 && !isNaN(r) && r >= 0) {
                    totalPrincipal += p;
                    weightedSum += (p * r);
                }
            }

            const error = document.getElementById('error-msg');
            const result = document.getElementById('result');

            if (totalPrincipal > 0) {
                const resRate = (weightedSum / totalPrincipal).toFixed(2);
                const resSum = totalPrincipal.toLocaleString('ru-RU');
                result.innerHTML = `Сумма: <strong>${resSum} ₽</strong>
Ставка: <strong>${resRate}%</strong>`;
                result.style.display = 'block';
                error.style.display = 'none';
            } else {
                result.style.display = 'none';
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
